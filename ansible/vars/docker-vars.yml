---
# =============================================================================
# Docker Global Configuration
# =============================================================================
# Global settings and resource limits.
# Secrets are in vars/vault.yml (encrypted)
# Images/versions: vars/containers-images.yml
# Ports:           vars/containers-ports.yml
# Enabled toggles: vars/containers-enabled.yml

# =============================================================================
# Global Settings
# =============================================================================
container_puid: 3000
container_pgid: 3000
container_timezone: "{{ timezone }}"

# Paths
container_data_root: "{{ docker_data_root }}"        # /docker

# Cloudflare credentials for Traefik (intermediates allow per-group override)
cloudflare_dns_zone: "{{ vault_cloudflare_dns_zone }}"
cloudflare_api_token: "{{ vault_cloudflare_api_token }}"

# Docker network
container_network: mediastack

# Traefik router middlewares (override per-environment)
traefik_router_middlewares: "security-headers@file,traefik-bouncer@file,ipAllowList@file"

# =============================================================================
# Resource Limits
# =============================================================================
resource_limits:
  traefik: { memory: "512M", cpus: "1.0" }
  crowdsec: { memory: "512M", cpus: "0.5" }
  portainer: { memory: "256M", cpus: "0.5" }
  grafana: { memory: "512M", cpus: "1.0" }
  prometheus: { memory: "1G", cpus: "1.0" }
  node_exporter: { memory: "128M", cpus: "0.25" }
  loki: { memory: "512M", cpus: "0.5" }
  promtail: { memory: "256M", cpus: "0.25" }
  vaultwarden: { memory: "256M", cpus: "0.5" }
  radarr: { memory: "1G", cpus: "1.0" }
  sonarr: { memory: "1G", cpus: "1.0" }
  sabnzbd: { memory: "2G", cpus: "2.0" }
  qbittorrent: { memory: "1G", cpus: "1.0" }
  homepage: { memory: "256M", cpus: "0.5" }
  watchtower: { memory: "128M", cpus: "0.25" }
  termix: { memory: "128M", cpus: "0.25" }
  # Media Management
  prowlarr: { memory: "512M", cpus: "0.5" }
  whisparr: { memory: "1G", cpus: "1.0" }
  seerr: { memory: "512M", cpus: "0.5" }
  tautulli: { memory: "512M", cpus: "0.5" }
  tracearr: { memory: "1G", cpus: "1.0" }
  wizarr: { memory: "256M", cpus: "0.25" }
  # Monitoring
  notifiarr: { memory: "256M", cpus: "0.5" }
  jellystat: { memory: "512M", cpus: "0.5" }
  jellystat_db: { memory: "256M", cpus: "0.5" }
  graylog: { memory: "2G", cpus: "2.0" }
  graylog_mongo: { memory: "512M", cpus: "0.5" }
  graylog_opensearch: { memory: "2G", cpus: "2.0" }
  # Security
  authentik_pg: { memory: "512M", cpus: "0.5" }
  authentik_redis: { memory: "256M", cpus: "0.25" }
  authentik_server: { memory: "1G", cpus: "1.0" }
  authentik_worker: { memory: "1G", cpus: "1.0" }
  lldap: { memory: "256M", cpus: "0.25" }
  # Content
  mealie: { memory: "1G", cpus: "0.5" }
  nextcloud: { memory: "1G", cpus: "1.0" }
  nextcloud_pg: { memory: "256M", cpus: "0.5" }
  paperless_redis: { memory: "256M", cpus: "0.25" }
  paperless_db: { memory: "512M", cpus: "0.5" }
  paperless_web: { memory: "2G", cpus: "2.0" }
  paperless_gotenberg: { memory: "512M", cpus: "0.5" }
  paperless_tika: { memory: "512M", cpus: "0.5" }
  paperless_ai: { memory: "512M", cpus: "0.5" }
  # Infrastructure
  ddns_updater: { memory: "128M", cpus: "0.25" }
  nebula_sync: { memory: "128M", cpus: "0.25" }
  newt: { memory: "128M", cpus: "0.25" }
