---
# =============================================================================
# Port Assignments
# =============================================================================
# Assign host ports for each service. Internal ports are fixed by the app.

container_ports:
  # Infrastructure - Reverse Proxy & Management
  traefik: 8080           # Dashboard
  traefik_http: 80        # HTTP entry point
  traefik_https: 443      # HTTPS entry point
  traefik_metrics: 8082   # Prometheus metrics
  crowdsec_api: 8081      # CrowdSec API
  crowdsec_metrics: 6060  # Prometheus metrics
  crowdsec_waf: 7422      # WAF
  portainer: 9000         # Portainer UI
  homepage: 3001          # Homepage dashboard
  termix: 8080            # Termix SSH management

  # Media Management - *arr stack
  radarr: 7878           # Movies (internal: 7878)
  sonarr: 8989           # TV Shows (internal: 8989)
  prowlarr: 9696         # Indexers (internal: 9696)
  whisparr: 6969         # Adult content (internal: 6969)
  seerr: 5055            # Media requests (internal: 5055)
  tautulli: 8181         # Plex stats (internal: 8181)
  tracearr: 3070         # Media tracking (internal: 3000)
  wizarr: 5690           # Invite management (internal: 5690)

  # Books & Documents
  paperless: 8000        # Documents (internal: 8000)
  paperless_ai: 3060     # Paperless AI (internal: 3000)

  # Security
  vaultwarden: 8086      # Password manager (internal: 80)
  authentik_http: 9001   # Authentik HTTP (internal: 9000)
  authentik_https: 9443  # Authentik HTTPS (internal: 9443)
  lldap_web: 17170       # LLDAP Web UI (internal: 17170)
  lldap_ldap: 3890       # LLDAP LDAP (internal: 3890)

  # Monitoring
  prometheus: 9090       # Metrics (internal: 9090)
  grafana: 3000          # Dashboards (internal: 3000)
  node_exporter: 9100    # Host metrics (internal: 9100)
  loki: 3100             # Log aggregation (internal: 3100)
  jellystat: 3050        # Jellyfin stats (internal: 3000)
  notifiarr: 5454        # Notifiarr (internal: 5454)
  graylog_web: 9300      # Graylog Web UI (internal: 9000)
  graylog_syslog: 5140   # Syslog TCP/UDP (internal: 5140)

  # Download Clients
  sabnzbd: 8083          # Usenet (internal: 8080)
  qbittorrent: 8084      # Torrents WebUI (internal: 8080)
  qbittorrent_bt: 6881   # BitTorrent protocol

  # Content
  drawio: 8085           # draw.io diagramming (internal: 8080)
  mealie: 9002           # Recipe manager (internal: 9000)
  nextcloud: 8443        # Cloud storage (internal: 443)

  # Infrastructure (no Traefik)
  ddns_updater: 8087     # DDNS Updater (internal: 8000)
