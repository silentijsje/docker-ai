---
- name: Ensure compose directory exists
  ansible.builtin.file:
    path: "{{ traefik_compose_dir }}"
    state: directory
    mode: '0770'
    owner: "{{ traefik_dir_owner }}"
    group: "{{ traefik_dir_group }}"

- name: Ensure Traefik config directory exists
  ansible.builtin.file:
    path: "{{ traefik_config_dest }}"
    state: directory
    mode: '0770'
    owner: "{{ traefik_dir_owner }}"
    group: "{{ traefik_dir_group }}"

- name: Copy Traefik static configuration
  ansible.builtin.copy:
    src: files/traefik.yaml
    dest: "{{ traefik_config_dest }}/traefik.yaml"
    mode: '0660'
    owner: "{{ traefik_dir_owner }}"
    group: "{{ traefik_dir_group }}"
  register: traefik_static_config

- name: Template Traefik internal routing (contains IPs)
  ansible.builtin.template:
    src: internal.yaml.j2
    dest: "{{ traefik_config_dest }}/internal.yaml"
    mode: '0660'
    owner: "{{ traefik_dir_owner }}"
    group: "{{ traefik_dir_group }}"
  register: traefik_internal_config

- name: Template Traefik dynamic configuration (contains secrets)
  ansible.builtin.template:
    src: dynamic.yaml.j2
    dest: "{{ traefik_config_dest }}/dynamic.yaml"
    mode: '0660'
    owner: "{{ traefik_dir_owner }}"
    group: "{{ traefik_dir_group }}"
  register: traefik_dynamic_config

- name: Template Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ traefik_compose_dir }}/docker-compose.yml"
    mode: '0660'
    owner: "{{ traefik_dir_owner }}"
    group: "{{ traefik_dir_group }}"

- name: Deploy Docker Compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ traefik_compose_dir }}"
    files:
      - docker-compose.yml
    state: present
    recreate: auto
  register: traefik_compose_result

- name: Restart Traefik if config changed
  community.docker.docker_container:
    name: traefik
    state: started
    restart: true
  when:
    - not traefik_compose_result.changed
    - >
      traefik_static_config.changed or
      traefik_internal_config.changed or
      traefik_dynamic_config.changed
