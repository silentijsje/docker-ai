---
- name: Ensure ufw is installed
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Set UFW default policies
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }
    - { direction: routed,   policy: deny }

- name: Delete stale UFW rules
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    delete: true
  loop: "{{ cloud_ufw_delete }}"
  failed_when: false

- name: Allow required ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop: "{{ cloud_ufw_allow }}"

- name: Enable UFW
  community.general.ufw:
    state: enabled
