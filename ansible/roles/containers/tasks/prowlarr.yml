---
# Prowlarr - Indexer Manager
# https://docs.linuxserver.io/images/docker-prowlarr

- name: Ensure Prowlarr directory exists
  ansible.builtin.file:
    path: "{{ container_data_root }}/prowlarr"
    state: directory
    mode: '0755'
    owner: "{{ container_dir_owner }}"
    group: "{{ container_dir_group }}"

- name: Deploy Prowlarr docker-compose
  ansible.builtin.template:
    src: prowlarr/docker-compose.yml.j2
    dest: "{{ container_data_root }}/prowlarr/docker-compose.yml"
    mode: '0644'
    owner: "{{ container_dir_owner }}"
    group: "{{ container_dir_group }}"
