---
# Whisparr - Adult Content Library Manager
# https://github.com/hotio/whisparr

- name: Ensure Whisparr directory exists
  ansible.builtin.file:
    path: "{{ container_data_root }}/whisparr"
    state: directory
    mode: '0755'
    owner: "{{ container_dir_owner }}"
    group: "{{ container_dir_group }}"

- name: Deploy Whisparr docker-compose
  ansible.builtin.template:
    src: whisparr/docker-compose.yml.j2
    dest: "{{ container_data_root }}/whisparr/docker-compose.yml"
    mode: '0644'
    owner: "{{ container_dir_owner }}"
    group: "{{ container_dir_group }}"
