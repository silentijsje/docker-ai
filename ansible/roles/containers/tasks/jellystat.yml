---
# Jellystat - Jellyfin Statistics
# https://github.com/CyferShepard/Jellystat

- name: Ensure Jellystat directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: "{{ container_dir_owner }}"
    group: "{{ container_dir_group }}"
  loop:
    - "{{ container_data_root }}/jellystat"
    - "{{ container_data_root }}/jellystat/backup-data"

- name: Ensure Jellystat postgres data dir exists
  ansible.builtin.file:
    path: "{{ container_data_root }}/jellystat/pgdata"
    state: directory
    mode: '0755'

- name: Deploy Jellystat docker-compose
  ansible.builtin.template:
    src: jellystat/docker-compose.yml.j2
    dest: "{{ container_data_root }}/jellystat/docker-compose.yml"
    mode: '0644'
    owner: "{{ container_dir_owner }}"
    group: "{{ container_dir_group }}"

- name: Start Jellystat containers
  community.docker.docker_compose_v2:
    project_src: "{{ container_data_root }}/jellystat"
    state: present
