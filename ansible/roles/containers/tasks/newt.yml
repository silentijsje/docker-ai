---
# Newt - Pangolin Tunnel Client

- name: Ensure Newt directory exists
  ansible.builtin.file:
    path: "{{ container_data_root }}/newt"
    state: directory
    mode: '0755'
    owner: "{{ container_dir_owner }}"
    group: "{{ container_dir_group }}"

- name: Deploy Newt docker-compose
  ansible.builtin.template:
    src: newt/docker-compose.yml.j2
    dest: "{{ container_data_root }}/newt/docker-compose.yml"
    mode: '0644'
    owner: "{{ container_dir_owner }}"
    group: "{{ container_dir_group }}"
