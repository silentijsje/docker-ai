---
# Main entry point for containers role
# Deploys enabled containers from the enabled_containers variable

# Remove stale crowdsec dir left from previous deployments (no traefik on these hosts)
- name: Remove stale crowdsec directory
  ansible.builtin.file:
    path: "{{ container_data_root }}/crowdsec"
    state: absent

# Ensure Docker network exists (MUST BE FIRST)
- name: Ensure Docker network exists
  community.docker.docker_network:
    name: "{{ container_network }}"
    state: present

# =============================================================================
# PHASE 1: Infrastructure Services (Deploy in Order)
# =============================================================================
# Traefik MUST be first - all other services depend on it

- name: Deploy Portainer
  ansible.builtin.include_tasks: portainer.yml
  when: enabled_containers.portainer | default(false)
  tags:
    - infrastructure
    - portainer

- name: Deploy Watchtower
  ansible.builtin.include_tasks: watchtower.yml
  when: enabled_containers.watchtower | default(false)
  tags:
    - infrastructure
    - watchtower

- name: Deploy Homepage
  ansible.builtin.import_tasks: homepage.yml
  when: enabled_containers.homepage | default(false)
  tags:
    - infrastructure
    - homepage

# =============================================================================
# PHASE 2+: Application Services
# =============================================================================

- name: Deploy Radarr
  ansible.builtin.include_tasks: radarr.yml
  when: enabled_containers.radarr | default(false)
  tags:
    - media_management
    - radarr

- name: Deploy Sonarr
  ansible.builtin.include_tasks: sonarr.yml
  when: enabled_containers.sonarr | default(false)
  tags:
    - media_management
    - sonarr

- name: Deploy SABnzbd
  ansible.builtin.include_tasks: sabnzbd.yml
  when: enabled_containers.sabnzbd | default(false)
  tags:
    - download_clients
    - sabnzbd

- name: Deploy qBittorrent
  ansible.builtin.include_tasks: qbittorrent.yml
  when: enabled_containers.qbittorrent | default(false)
  tags:
    - download_clients
    - qbittorrent

- name: Deploy Booklore
  ansible.builtin.include_tasks: booklore.yml
  when: enabled_containers.booklore | default(false)
  tags:
    - content
    - booklore

# =============================================================================
# Media Management (continued)
# =============================================================================

- name: Deploy Prowlarr
  ansible.builtin.include_tasks: prowlarr.yml
  when: enabled_containers.prowlarr | default(false)
  tags:
    - media_management
    - prowlarr

- name: Deploy Whisparr
  ansible.builtin.include_tasks: whisparr.yml
  when: enabled_containers.whisparr | default(false)
  tags:
    - media_management
    - whisparr

- name: Deploy Overseerr
  ansible.builtin.include_tasks: overseerr.yml
  when: enabled_containers.overseerr | default(false)
  tags:
    - media_management
    - overseerr

- name: Deploy Tautulli
  ansible.builtin.include_tasks: tautulli.yml
  when: enabled_containers.tautulli | default(false)
  tags:
    - media_management
    - tautulli

- name: Deploy Tracearr
  ansible.builtin.include_tasks: tracearr.yml
  when: enabled_containers.tracearr | default(false)
  tags:
    - media_management
    - tracearr

- name: Deploy Wizarr
  ansible.builtin.include_tasks: wizarr.yml
  when: enabled_containers.wizarr | default(false)
  tags:
    - media_management
    - wizarr

# =============================================================================
# Content Services
# =============================================================================

- name: Deploy Mealie
  ansible.builtin.include_tasks: mealie.yml
  when: enabled_containers.mealie | default(false)
  tags:
    - content
    - mealie

- name: Deploy Nextcloud
  ansible.builtin.include_tasks: nextcloud.yml
  when: enabled_containers.nextcloud | default(false)
  tags:
    - content
    - nextcloud

- name: Deploy Paperless-NGX
  ansible.builtin.include_tasks: paperless.yml
  when: enabled_containers.paperless | default(false)
  tags:
    - content
    - paperless

# =============================================================================
# Security Services
# =============================================================================

- name: Deploy Authentik
  ansible.builtin.include_tasks: authentik.yml
  when: enabled_containers.authentik | default(false)
  tags:
    - security
    - authentik

- name: Deploy LLDAP
  ansible.builtin.include_tasks: lldap.yml
  when: enabled_containers.lldap | default(false)
  tags:
    - security
    - lldap

- name: Deploy Vaultwarden
  ansible.builtin.import_tasks: vaultwarden.yml
  when: enabled_containers.vaultwarden | default(false)
  tags:
    - security
    - vaultwarden

# =============================================================================
# PHASE 3: Monitoring
# =============================================================================

- name: Deploy Monitoring Stack
  ansible.builtin.import_tasks: monitoring.yml
  when: enabled_containers.monitoring | default(false)
  tags:
    - monitoring

- name: Deploy Jellystat
  ansible.builtin.include_tasks: jellystat.yml
  when: enabled_containers.jellystat | default(false)
  tags:
    - monitoring
    - jellystat

- name: Deploy Notifiarr
  ansible.builtin.include_tasks: notifiarr.yml
  when: enabled_containers.notifiarr | default(false)
  tags:
    - monitoring
    - notifiarr

# =============================================================================
# Infrastructure Services (no Traefik)
# =============================================================================

- name: Deploy DDNS Updater
  ansible.builtin.include_tasks: ddns_updater.yml
  when: enabled_containers.ddns_updater | default(false)
  tags:
    - infrastructure
    - ddns_updater

- name: Deploy Nebula-Sync
  ansible.builtin.include_tasks: nebula_sync.yml
  when: enabled_containers.nebula_sync | default(false)
  tags:
    - infrastructure
    - nebula_sync

- name: Deploy Newt
  ansible.builtin.include_tasks: newt.yml
  when: enabled_containers.newt | default(false)
  tags:
    - infrastructure
    - newt

# =============================================================================
# Master Compose File
# =============================================================================

- name: Deploy master Docker Compose file
  ansible.builtin.template:
    src: docker-compose.master.yml.j2
    dest: "{{ container_data_root }}/docker-compose.yml"
    mode: '0660'
  tags:
    - always
