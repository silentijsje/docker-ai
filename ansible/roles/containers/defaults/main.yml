---
# Default variables for containers role
# Override these in group_vars/containers.yml

container_puid: 1000
container_pgid: 1000
container_timezone: Europe/Amsterdam
container_network: mediastack

container_data_root: /mnt/docker
container_media_root: /mnt/media

container_dir_owner: stanley
container_dir_group: renfrew

traefik_enabled: false
traefik_compose_dir: "{{ container_data_root }}/traefik"
traefik_config_dest: "{{ container_data_root }}/traefik/config"
