---
- name: Update all servers
  hosts: all
  become: true
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        force_apt_get: true
        cache_valid_time: 3600

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
        force_apt_get: true

    - name: Remove unused packages
      ansible.builtin.apt:
        autoremove: true
        autoclean: true

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Reboot if required
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible for system updates"
        connect_timeout: 5
        reboot_timeout: 300
        pre_reboot_delay: 0
        post_reboot_delay: 30
        test_command: uptime
      when: reboot_required_file.stat.exists

- name: Prune unused Docker images
  hosts: docker_vm
  become: true
  tasks:
    - name: Remove unused Docker images
      community.docker.docker_prune:
        images: true
        images_filters:
          dangling: false

- name: Sync SSH authorized keys from GitHub
  hosts: all
  become: true
  vars_files:
    - vars/users.yml
    - vars/vault.yml
  tasks:
    - name: Get existing users
      ansible.builtin.getent:
        database: passwd
      register: etc_passwd

    - name: Set authorized keys from GitHub
      ansible.posix.authorized_key:
        user: "{{ item.name }}"
        state: present
        key: https://github.com/silentijsje.keys
        exclusive: true
      loop: "{{ users }}"
      when: item.name in etc_passwd.ansible_facts.getent_passwd

- name: Update Proxmox LXC containers
  hosts: proxmox_host
  become: true
  tasks:
    - name: Run LXC updater script
      ansible.builtin.script:
        cmd: ../scripts/updater-proxmox-apps.sh
        executable: /bin/bash
