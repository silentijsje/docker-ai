---
# Deploy cloud.lan (Pangolin tunneling stack + identity/monitoring)
# Usage: ansible-playbook cloud.yml --vault-password-file=.vault_pass

- name: Deploy cloud.lan
  hosts: cloud
  vars_files:
    - vars/vault.yml
    - vars/ufw-vault.yml
    - vars/docker-vars.yml
    - vars/containers-images.yml
    - vars/containers-ports.yml
    - vars/containers-enabled.yml
    - vars/cloud-vars.yml

  roles:
    - role: docker
      become: true
    - role: cloud
      become: true
