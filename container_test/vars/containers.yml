---
# =============================================================================
# Single-service container definitions
# =============================================================================
# Each entry maps 1:1 to a docker-compose.yml rendered from the generic template.
# Multi-service stacks (authentik, paperless, etc.) live in stacks.yml.
#
# Schema:
#   name          - container/service name (also used as compose project dir)
#   container_name - optional override (default: name)
#   enabled       - bool toggle
#   image         - docker image reference (can reference Ansible vars)
#   internal_port - primary container port (optional if no HTTP service)
#   host_port     - mapped host port (optional if no HTTP service)
#   extra_ports   - list of "host:container[/proto]" strings for extra ports
#   memory        - memory limit
#   cpus          - CPU limit
#   traefik       - optional block; omit entirely to skip Traefik labels
#     subdomain   - DNS subdomain (full: subdomain.{{ cloudflare_dns_zone }})
#     middlewares - optional override (default: traefik_router_middlewares)
#     scheme      - optional override (default: http)
#     port        - optional override if Traefik port differs from internal_port
#   proxy_network - bool, default true when traefik defined (set false to skip)
#   volumes       - list of volume strings
#   env           - list of VAR=value strings appended after PUID/PGID/TZ
#   env_file      - optional env_file filename
#   add_puid_pgid - bool, default true; set false for containers that don't use it
#   hostname      - optional container hostname
#   user          - optional user override
#   shm_size      - optional shared memory size

containers:

  # ===========================================================================
  # Infrastructure
  # ===========================================================================

  - name: portainer
    enabled: true
    image: "{{ portainer_image }}"
    internal_port: 9000
    host_port: "{{ container_ports.portainer }}"
    memory: "{{ resource_limits.portainer.memory }}"
    cpus: "{{ resource_limits.portainer.cpus }}"
    traefik:
      subdomain: portainer
    proxy_network: false  # original portainer template doesn't join proxy network
    add_puid_pgid: false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - "{{ container_data_root }}/portainer:/data"
    env:
      - TZ={{ container_timezone }}

  - name: homepage
    enabled: true
    image: "{{ homepage_image }}"
    internal_port: 3000
    host_port: "{{ container_ports.homepage }}"
    memory: "{{ resource_limits.homepage.memory }}"
    cpus: "{{ resource_limits.homepage.cpus }}"
    traefik:
      subdomain: homepage
    volumes:
      - "{{ container_data_root }}/homepage/config:/app/config"
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file: .env

  - name: watchtower
    enabled: true
    image: "{{ watchtower_image }}"
    memory: "{{ resource_limits.watchtower.memory }}"
    cpus: "{{ resource_limits.watchtower.cpus }}"
    add_puid_pgid: false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env:
      - TZ={{ container_timezone }}
      - WATCHTOWER_CLEANUP={{ watchtower_cleanup | lower }}
      - WATCHTOWER_INCLUDE_STOPPED={{ watchtower_include_stopped | lower }}
      - WATCHTOWER_SCHEDULE={{ watchtower_schedule }}
      - DOCKER_API_VERSION=1.40
    # no traefik, no port

  # ===========================================================================
  # Media Management
  # ===========================================================================

  - name: radarr
    enabled: true
    image: "{{ radarr_image }}"
    container_name: "{{ radarr_container_name }}"
    internal_port: 7878
    host_port: "{{ container_ports.radarr }}"
    memory: "{{ resource_limits.radarr.memory }}"
    cpus: "{{ resource_limits.radarr.cpus }}"
    traefik:
      subdomain: radarr
    volumes:
      - "{{ container_media_root }}:/mnt/media"
      - "{{ container_data_root }}/radarr:/config"

  - name: sonarr
    enabled: true
    image: "{{ sonarr_image }}"
    container_name: "{{ sonarr_container_name }}"
    internal_port: 8989
    host_port: "{{ container_ports.sonarr }}"
    memory: "{{ resource_limits.sonarr.memory }}"
    cpus: "{{ resource_limits.sonarr.cpus }}"
    traefik:
      subdomain: sonarr
    volumes:
      - "{{ container_media_root }}:/mnt/media"
      - "{{ container_data_root }}/sonarr:/config"

  - name: prowlarr
    enabled: true
    image: "{{ prowlarr_image }}"
    container_name: "{{ prowlarr_container_name }}"
    internal_port: 9696
    host_port: "{{ container_ports.prowlarr }}"
    memory: "{{ resource_limits.prowlarr.memory }}"
    cpus: "{{ resource_limits.prowlarr.cpus }}"
    traefik:
      subdomain: prowlarr
    volumes:
      - "{{ container_data_root }}/prowlarr:/config"

  - name: whisparr
    enabled: true
    image: "{{ whisparr_image }}"
    container_name: "{{ whisparr_container_name }}"
    internal_port: 6969
    host_port: "{{ container_ports.whisparr }}"
    memory: "{{ resource_limits.whisparr.memory }}"
    cpus: "{{ resource_limits.whisparr.cpus }}"
    traefik:
      subdomain: whisparr
    volumes:
      - "{{ container_media_root }}:/mnt/media"
      - "{{ container_data_root }}/whisparr:/config"

  - name: seerr
    enabled: true
    image: "{{ seerr_image }}"
    container_name: "{{ seerr_container_name }}"
    internal_port: 5055
    host_port: "{{ container_ports.seerr }}"
    memory: "{{ resource_limits.seerr.memory }}"
    cpus: "{{ resource_limits.seerr.cpus }}"
    traefik:
      subdomain: seerr
    volumes:
      - "{{ container_data_root }}/seerr:/config"

  - name: tautulli
    enabled: true
    image: "{{ tautulli_image }}"
    container_name: "{{ tautulli_container_name }}"
    internal_port: 8181
    host_port: "{{ container_ports.tautulli }}"
    memory: "{{ resource_limits.tautulli.memory }}"
    cpus: "{{ resource_limits.tautulli.cpus }}"
    traefik:
      subdomain: tautulli
    volumes:
      - "{{ container_data_root }}/tautulli:/config"

  - name: tracearr
    enabled: false
    image: "{{ tracearr_image }}"
    container_name: "{{ tracearr_container_name }}"
    internal_port: 3000
    host_port: "{{ container_ports.tracearr }}"
    memory: "{{ resource_limits.tracearr.memory }}"
    cpus: "{{ resource_limits.tracearr.cpus }}"
    shm_size: 256mb
    add_puid_pgid: false
    traefik:
      subdomain: tracearr
    volumes:
      - "{{ container_data_root }}/tracearr/db:/data/postgres"
      - "{{ container_data_root }}/tracearr/redis:/data/redis"
      - "{{ container_data_root }}/tracearr/data:/data/tracearr"
    env:
      - TZ={{ container_timezone }}
      - LOG_LEVEL=info

  - name: wizarr
    enabled: false
    image: "{{ wizarr_image }}"
    container_name: "{{ wizarr_container_name }}"
    internal_port: 5690
    host_port: "{{ container_ports.wizarr }}"
    memory: "{{ resource_limits.wizarr.memory }}"
    cpus: "{{ resource_limits.wizarr.cpus }}"
    traefik:
      subdomain: wizarr
    volumes:
      - "{{ container_data_root }}/wizarr/data:/data"
    env:
      - DISABLE_BUILTIN_AUTH=false

  # ===========================================================================
  # Download Clients
  # ===========================================================================

  - name: sabnzbd
    enabled: true
    image: "{{ sabnzbd_image }}"
    container_name: "{{ sabnzbd_container_name }}"
    internal_port: 8080
    host_port: "{{ container_ports.sabnzbd }}"
    memory: "{{ resource_limits.sabnzbd.memory }}"
    cpus: "{{ resource_limits.sabnzbd.cpus }}"
    traefik:
      subdomain: nzb
    volumes:
      - "{{ container_data_root }}/sabnzbd:/config"
      - "{{ container_media_root }}:/mnt/media"
      - "{{ container_temp_root }}:/mnt/temporary"
    env:
      - SABNZBD__MISC__HOST_WHITELIST_ENTRIES=nzb.{{ cloudflare_dns_zone }}

  - name: qbittorrent
    enabled: true
    image: "{{ qbittorrent_image }}"
    container_name: "{{ qbittorrent_container_name }}"
    internal_port: "{{ container_ports.qbittorrent }}"
    host_port: "{{ container_ports.qbittorrent }}"
    extra_ports:
      - "{{ container_ports.qbittorrent_bt }}:6881/tcp"
      - "{{ container_ports.qbittorrent_bt }}:6881/udp"
    memory: "{{ resource_limits.qbittorrent.memory }}"
    cpus: "{{ resource_limits.qbittorrent.cpus }}"
    traefik:
      subdomain: torrent
      middlewares: "security-headers@file,traefik-bouncer@file"
      port: "{{ container_ports.qbittorrent }}"
    volumes:
      - "{{ container_data_root }}/qbittorrent:/config"
      - "{{ container_media_root }}/Downloads:/downloads"
      - "{{ container_temp_root }}:/temporary"
    env:
      - WEBUI_PORT={{ container_ports.qbittorrent }}

  # ===========================================================================
  # Content
  # ===========================================================================

  - name: drawio
    enabled: true
    image: "{{ drawio_image }}"
    container_name: "{{ drawio_container_name }}"
    internal_port: 8080
    host_port: "{{ container_ports.drawio }}"
    memory: "{{ resource_limits.drawio.memory }}"
    cpus: "{{ resource_limits.drawio.cpus }}"
    add_puid_pgid: false
    traefik:
      subdomain: drawio
    # stateless — no volumes

  - name: mealie
    enabled: false
    image: "{{ mealie_image }}"
    container_name: "{{ mealie_container_name }}"
    internal_port: 9000
    host_port: "{{ container_ports.mealie }}"
    memory: "{{ resource_limits.mealie.memory }}"
    cpus: "{{ resource_limits.mealie.cpus }}"
    traefik:
      subdomain: mealie
    volumes:
      - "{{ container_data_root }}/mealie/data:/app/data/"
    env:
      - ALLOW_SIGNUP=false
      - OPENAI_API_KEY={{ vault_mealie_openai_api_key }}
      - DEFAULT_GROUP=Family
      - DEFAULT_HOUSEHOLD=Renfrew
      - BASE_URL=https://mealie.{{ cloudflare_dns_zone }}
      - OIDC_AUTH_ENABLED=true
      - OIDC_PROVIDER_NAME=authentik
      - OIDC_CONFIGURATION_URL=https://auth.{{ cloudflare_dns_zone }}/application/o/mealie/.well-known/openid-configuration
      - OIDC_CLIENT_ID={{ vault_mealie_oidc_client_id }}
      - OIDC_CLIENT_SECRET={{ vault_mealie_oidc_client_secret }}
      - OIDC_SIGNUP_ENABLED=true
      - OIDC_USER_GROUP=mealie-users
      - OIDC_ADMIN_GROUP=mealie-admins
      - OIDC_AUTO_REDIRECT=false
      - OIDC_REMEMBER_ME=true
      - SMTP_HOST={{ vault_smtp_host }}
      - SMTP_PORT={{ vault_smtp_port}}
      - SMTP_USER={{ vault_smtp_username }}
      - SMTP_PASSWORD={{ vault_mealie_smtp_password }}
      - SMTP_FROM_NAME={{ vault_smtp_from }}
      - SMTP_AUTH_STRATEGY=TLS
      - SMTP_FROM_EMAIL={{ vault_smtp_from_email }}

  # ===========================================================================
  # Security
  # ===========================================================================

  - name: vaultwarden
    enabled: false
    image: "{{ vaultwarden_image }}"
    container_name: "{{ vaultwarden_container_name }}"
    internal_port: 80
    host_port: "{{ container_ports.vaultwarden }}"
    memory: "{{ resource_limits.vaultwarden.memory }}"
    cpus: "{{ resource_limits.vaultwarden.cpus }}"
    add_puid_pgid: false
    traefik:
      subdomain: vault
    volumes:
      - "{{ container_data_root }}/vaultwarden/data:/data"
    env:
      - TZ={{ container_timezone }}
      - DOMAIN=https://vault.{{ cloudflare_dns_zone }}
      - ADMIN_TOKEN={{ vault_vaultwarden_admin_token }}
      - SIGNUPS_ALLOWED=false
      - SMTP_HOST={{ vault_smtp_host }}
      - SMTP_PORT={{ vault_smtp_port }}
      - SMTP_SECURITY=starttls
      - SMTP_USERNAME={{ vault_smtp_username }}
      - SMTP_PASSWORD={{ vault_vaultwarden_smtp_password }}
      - SMTP_FROM={{ vault_vaultwarden_smtp_from }}
      - SMTP_FROM_NAME=Vaultwarden

  - name: lldap
    enabled: false
    image: "{{ lldap_image }}"
    container_name: "{{ lldap_container_name }}"
    internal_port: 17170
    host_port: "{{ container_ports.lldap_web }}"
    extra_ports:
      - "{{ container_ports.lldap_ldap }}:3890"
    memory: "{{ resource_limits.lldap.memory }}"
    cpus: "{{ resource_limits.lldap.cpus }}"
    traefik:
      subdomain: ldap
    volumes:
      - "{{ container_data_root }}/lldap/data:/data"
    env:
      - LLDAP_JWT_SECRET={{ vault_lldap_jwt_secret }}
      - LLDAP_KEY_SEED={{ vault_lldap_key_seed }}
      - LLDAP_LDAP_BASE_DN=dc=silentijsje,dc=com
      - LLDAP_LDAP_USER_PASS={{ vault_lldap_ldap_user_pass }}

  # ===========================================================================
  # Monitoring
  # ===========================================================================

  - name: notifiarr
    enabled: true
    image: "{{ notifiarr_image }}"
    container_name: "{{ notifiarr_container_name }}"
    internal_port: 5454
    host_port: "{{ container_ports.notifiarr }}"
    memory: "{{ resource_limits.notifiarr.memory }}"
    cpus: "{{ resource_limits.notifiarr.cpus }}"
    hostname: notifiarr
    add_puid_pgid: false
    traefik:
      subdomain: notifiarr
    volumes:
      - "{{ container_data_root }}/notifiarr:/config"
      - /var/run/utmp:/var/run/utmp
      - /etc/machine-id:/etc/machine-id:ro
    env:
      - TZ={{ container_timezone }}

  # ===========================================================================
  # Infrastructure (no Traefik)
  # ===========================================================================

  - name: ddns-updater
    enabled: true
    image: "{{ ddns_updater_image }}"
    container_name: "{{ ddns_updater_container_name }}"
    internal_port: 8000
    host_port: "{{ container_ports.ddns_updater }}"
    memory: "{{ resource_limits.ddns_updater.memory }}"
    cpus: "{{ resource_limits.ddns_updater.cpus }}"
    user: "{{ container_puid }}:{{ container_pgid }}"
    add_puid_pgid: false
    volumes:
      - "{{ container_data_root }}/ddns-updater:/updater/data"
    env:
      - TZ={{ container_timezone }}
      - CONFIG=
      - PERIOD=5m
      - UPDATE_COOLDOWN_PERIOD=5m
      - PUBLICIP_FETCHERS=all
      - PUBLICIP_HTTP_PROVIDERS=all
      - PUBLICIPV4_HTTP_PROVIDERS=all
      - PUBLICIPV6_HTTP_PROVIDERS=all
      - PUBLICIP_DNS_PROVIDERS=all
      - PUBLICIP_DNS_TIMEOUT=3s
      - HTTP_TIMEOUT=10s
      - LISTENING_ADDRESS=:8000
      - ROOT_URL=/
      - BACKUP_PERIOD=0
      - BACKUP_DIRECTORY=/updater/data
      - LOG_LEVEL=info
      - LOG_CALLER=hidden
      - SHOUTRRR_ADDRESSES=
    # no traefik

  - name: nebula-sync
    enabled: false
    image: "{{ nebula_sync_image }}"
    container_name: "{{ nebula_sync_container_name }}"
    memory: "{{ resource_limits.nebula_sync.memory }}"
    cpus: "{{ resource_limits.nebula_sync.cpus }}"
    add_puid_pgid: false
    env:
      - PRIMARY={{ vault_nebula_sync_primary }}
      - REPLICAS={{ vault_nebula_sync_replicas }}
      - FULL_SYNC=false
      - RUN_GRAVITY=false
      - CRON=*/15 * * * *
      - CLIENT_SKIP_TLS_VERIFICATION=true
      - TZ={{ container_timezone }}
      - SYNC_CONFIG_DNS=true
      - SYNC_CONFIG_DHCP=false
      - SYNC_CONFIG_NTP=false
      - SYNC_CONFIG_RESOLVER=false
      - SYNC_CONFIG_DATABASE=false
      - SYNC_CONFIG_MISC=false
      - SYNC_CONFIG_DEBUG=false
      - SYNC_GRAVITY_DHCP_LEASES=false
      - SYNC_GRAVITY_GROUP=false
      - SYNC_GRAVITY_AD_LIST=true
      - SYNC_GRAVITY_AD_LIST_BY_GROUP=true
      - SYNC_GRAVITY_DOMAIN_LIST=true
      - SYNC_GRAVITY_DOMAIN_LIST_BY_GROUP=true
      - SYNC_GRAVITY_CLIENT=false
      - SYNC_GRAVITY_CLIENT_BY_GROUP=false
    # no port, no traefik

  - name: newt
    enabled: true
    image: "{{ newt_image }}"
    container_name: "{{ newt_container_name }}"
    memory: "{{ resource_limits.newt.memory }}"
    cpus: "{{ resource_limits.newt.cpus }}"
    add_puid_pgid: false
    env:
      - PANGOLIN_ENDPOINT=https://pangolin.{{ cloudflare_dns_zone }}
      - NEWT_ID={{ vault_newt_id }}
      - NEWT_SECRET={{ vault_newt_secret }}
    # no port, no traefik
